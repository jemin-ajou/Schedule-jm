<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Visual Task Manager v3</title>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts & Pretendard -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.5);
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --info: #38bdf8;
            --purple: #a855f7;
            --glass-border: rgba(255, 255, 255, 0.05);
            --font-main: 'Pretendard Variable', -apple-system, sans-serif;
            --font-accent: 'Outfit', sans-serif;
            --body-bg: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text: #334155;
            --text-dim: #64748b;
            --glass-border: rgba(0, 0, 0, 0.05);
            --body-bg: radial-gradient(circle at top right, #e2e8f0 0%, #f1f5f9 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        body {
            background: var(--body-bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body.light-mode .title, 
        body.light-mode .nav-text,
        body.light-mode .task-title,
        body.light-mode .ins-text,
        body.light-mode .stat-num {
            color: #1e293b;
        }

        body.light-mode .stat-num {
            background: linear-gradient(to bottom, #1e293b, #64748b);
            -webkit-background-clip: text;
            background-clip: text;
        }

        body.light-mode .nav-btn,
        body.light-mode .choice {
            color: #64748b;
        }

        body.light-mode .nav-btn:hover,
        body.light-mode .btn-icon:hover {
            color: var(--primary);
        }

        /* Ambient Background Elements */
        .bg-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%); filter: blur(80px); z-index: -1; opacity: 0.3; pointer-events: none; }
        .bg-glow-1 { top: -100px; left: -100px; }
        .bg-glow-2 { bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(168, 85, 247, 0.3) 0%, transparent 70%); }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 450px), 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1600px;
            z-index: 10;
            margin: 0 auto;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }
        
        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            .container { gap: 15px; grid-template-columns: 1fr; }
            .header { padding: 20px 15px 15px; }
            .modal-body { width: 95%; padding: 20px; }
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .header { padding: 30px 24px 20px; flex-shrink: 0; border-bottom: 1px solid var(--glass-border); background: linear-gradient(to bottom, rgba(255,255,255,0.02), transparent); }
        .title { font-family: var(--font-accent); font-size: 1.5rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 12px; letter-spacing: -0.01em; }
        .subtitle { font-size: 0.65rem; color: var(--text-dim); margin-top: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; }

        /* Badges & Micro-UI */
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; display: inline-flex; align-items: center; gap: 5px; transition: 0.2s; white-space: nowrap; }
        .badge.type-once { background: rgba(56, 189, 248, 0.1); color: var(--info); border: 1px solid rgba(56, 189, 248, 0.2); }
        .badge.type-keep { background: rgba(168, 85, 247, 0.1); color: var(--purple); border: 1px solid rgba(168, 85, 247, 0.2); }
        .badge.priority-high { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.2); }
        .badge.priority-medium { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge.priority-low { background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge.carryover { background: rgba(244, 63, 94, 0.2); color: #fda4af; border: 1px solid rgba(244, 63, 94, 0.4); animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* Column 1: Schedule */
        .col-schedule { flex: 1.1; }
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin: 20px 24px; }
        .nav-text { font-family: var(--font-accent); font-weight: 800; font-size: 1.1rem; color: white; }
        .nav-btn { background: var(--glass-border); border: 1px solid var(--glass-border); color: white; border-radius: 12px; width: 40px; height: 40px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); border-color: var(--primary); }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 0 24px 24px; flex: 1; min-height: 0; }
        .day-header { font-size: 0.6rem; font-weight: 900; color: var(--text-dim); text-align: center; margin-bottom: 5px; opacity: 0.6; }
        .day-cell { background: rgba(255,255,255,0.015); border-radius: 18px; padding: 12px; cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .day-cell::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent); opacity: 0; transition: 0.4s; }
        .day-cell:hover::after { opacity: 1; }
        .day-cell:hover { background: rgba(255,255,255,0.05); transform: scale(1.05); border-color: var(--glass-border); z-index: 5; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .day-cell.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.15); box-shadow: 0 0 30px rgba(99, 102, 241, 0.2); }
        .day-cell.today { border-color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        .day-cell.other { opacity: 0.1; filter: grayscale(1); pointer-events: none; }
        .day-num { font-family: var(--font-accent); font-size: 1rem; font-weight: 600; margin-bottom: 8px; z-index: 1; }
        .day-dots { display: flex; flex-wrap: wrap; gap: 3px; z-index: 1; }
        .dot { width: 5px; height: 5px; border-radius: 50%; box-shadow: 0 0 5px currentColor; }

        /* Column 2: To do List */
        .col-todo { flex: 1; }
        .tabs { display: flex; gap: 6px; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 18px; margin: 0 24px 25px; }
        .tab { flex: 1; padding: 12px; border-radius: 14px; text-align: center; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: var(--text-dim); transition: 0.4s; }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); transform: translateY(-2px); }

        .input-box { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin: 0 24px 25px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); }
        .input-inner { display: flex; gap: 12px; margin-bottom: 18px; }
        input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 15px; padding: 14px 18px; color: white; outline: none; transition: 0.3s; font-size: 0.95rem; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); }
        .add-btn { background: linear-gradient(135deg, var(--primary), var(--purple)); border: none; color: white; border-radius: 15px; width: 54px; height: 54px; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .add-btn:hover { transform: rotate(90deg) scale(1.1); }

        .selectors { display: flex; gap: 15px; }
        .s-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .s-label { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; padding-left: 4px; }
        .choices { display: flex; gap: 5px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 12px; }
        .choice { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-dim); border-radius: 10px; cursor: pointer; font-size: 0.7rem; font-weight: 700; transition: 0.3s; }
        .choice.active { background: white; color: var(--bg); font-weight: 800; }

        .list-container { flex: 1; overflow-y: auto; padding: 0 24px 24px; display: flex; flex-direction: column; gap: 12px; }
        .task-card { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 22px; padding: 18px; display: flex; align-items: center; transition: var(--transition); position: relative; animation: slideIn 0.5s backwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .task-card:hover { background: rgba(255,255,255,0.05); transform: scale(1.02); border-color: rgba(255,255,255,0.15); }
        .task-card.is-carry { border-left: 6px solid var(--danger); background: linear-gradient(to right, rgba(244, 63, 94, 0.05), transparent); }
        .task-card.is-editing { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }

        .check-circle { width: 26px; height: 26px; border: 2.5px solid var(--primary); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; flex-shrink: 0; }
        .check-circle.done { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); border-color: transparent; }
        .task-body { flex: 1; margin: 0 18px; min-width: 0; }
        .task-title { font-size: 1rem; font-weight: 600; color: white; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: 0.3s; }
        .task-title.done { text-decoration: line-through; opacity: 0.3; }
        .task-metadata { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; align-items: center; }
        .task-footer { font-size: 0.65rem; color: var(--text-dim); display: flex; align-items: center; gap: 5px; opacity: 0.7; }
        .actions { display: flex; gap: 10px; opacity: 0; transition: 0.3s; }
        .task-card:hover .actions { opacity: 1; }
        .btn-icon { color: var(--text-dim); background: none; border: none; cursor: pointer; transition: 0.2s; padding: 5px; }
        .btn-icon:hover { color: white; transform: scale(1.2); }
        .btn-icon.del:hover { color: var(--danger); }

        /* Column 3: Insight Dashboard */
        .col-insight { flex: 1.4; }
        .insight-scroller { flex: 1; overflow-y: auto; padding: 0 24px 24px; display: flex; flex-direction: column; gap: 28px; }
        .ins-section { display: flex; flex-direction: column; gap: 15px; }
        .ins-header { font-family: var(--font-accent); font-size: 0.85rem; font-weight: 900; color: var(--text-dim); display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 0.12em; position: sticky; top: 0; z-index: 2; padding: 10px 0; background: var(--card-bg); backdrop-filter: blur(5px); }
        .ins-header i { width: 16px; }

        .ins-card { background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid var(--glass-border); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; border-left: 4px solid transparent; }
        .ins-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .ins-text { font-size: 0.95rem; font-weight: 700; color: white; }
        .ins-meta { display: flex; gap: 8px; margin-top: 6px; }

        /* Big Data Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.92); backdrop-filter: blur(30px); z-index: 1000; display: flex; align-items: center; justify-content: center; animation: modalIn 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-body { background: rgba(15, 23, 42, 0.7); border: 2px solid var(--glass-border); border-radius: 40px; width: 850px; padding: 50px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 50px 100px rgba(0,0,0,0.8); }
        .stat-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
        .stat-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 28px; padding: 30px; text-align: center; transition: 0.3s; }
        .stat-item:hover { transform: translateY(-5px); border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .stat-num { font-family: var(--font-accent); font-size: 2.8rem; font-weight: 800; background: linear-gradient(to bottom, #fff, var(--text-dim)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }

        .progress-track { width: 100%; height: 12px; background: rgba(0,0,0,0.4); border-radius: 10px; overflow: hidden; margin-top: 15px; position: relative; }
        .progress-bar { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }

        .chart-row { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .chart-label { width: 100px; font-size: 0.8rem; font-weight: 800; color: var(--text-dim); }
        .chart-line-bg { flex: 1; height: 10px; background: rgba(0,0,0,0.3); border-radius: 5px; overflow: hidden; }
        .chart-line-fill { height: 100%; border-radius: 5px; background: var(--primary); transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }

        .big-data-btn { background: linear-gradient(135deg, var(--primary), #a855f7); color: white; border: none; padding: 12px 24px; border-radius: 16px; font-weight: 800; font-family: var(--font-accent); font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.4s; box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3); }
        .big-data-btn:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.5); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [todos, setTodos] = useState(() => {
                const saved = localStorage.getItem('premium_visual_mgr_v3');
                return saved ? JSON.parse(saved) : [];
            });

            const [inputValue, setInputValue] = useState("");
            const [taskType, setTaskType] = useState("once");
            const [priority, setPriority] = useState("medium");
            const [activeTab, setActiveTab] = useState("today");
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [showBigData, setShowBigData] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [editValue, setEditValue] = useState("");
            const [editType, setEditType] = useState("");
            const [editPriority, setEditPriority] = useState("");

            const [theme, setTheme] = useState(() => {
                const saved = localStorage.getItem('theme');
                return saved ? saved : 'dark';
            });

            useEffect(() => {
                document.body.className = theme === 'light' ? 'light-mode' : '';
                localStorage.setItem('theme', theme);
            }, [theme]);

            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

            const todayStr = useMemo(() => {
                const n = new Date();
                return `${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, '0')}-${String(n.getDate()).padStart(2, '0')}`;
            }, []);

            const selStr = useMemo(() => {
                const y = selectedDate.getFullYear(), m = String(selectedDate.getMonth()+1).padStart(2, '0'), d = String(selectedDate.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }, [selectedDate]);

            useEffect(() => {
                localStorage.setItem('premium_visual_mgr_v3', JSON.stringify(todos));
                if (window.lucide) lucide.createIcons();
            }, [todos, activeTab, editingId, showBigData, selStr]);

            // Monthly stats for Big Data
            const monthlyStats = useMemo(() => {
                const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
                const mTasks = todos.filter(t => {
                    const d = new Date(t.date);
                    return d.getFullYear() === y && d.getMonth() === m;
                });
                const comp = mTasks.filter(t => t.completed).length, total = mTasks.length;
                const catMap = {};
                mTasks.forEach(t => catMap[t.category] = (catMap[t.category] || 0) + 1);
                const categories = Object.entries(catMap).sort((a,b) => b[1] - a[1]).slice(0, 5);
                const prioMap = { high: 0, medium: 0, low: 0 };
                mTasks.forEach(t => prioMap[t.priority]++);
                return { total, comp, rate: total > 0 ? Math.round((comp/total)*100) : 0, categories, prioMap };
            }, [todos, currentMonth]);

            const addTodo = () => {
                if (!inputValue.trim()) return;
                const now = new Date(), time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                const tag = (inputValue.match(/#(\S+)/) || [])[1] || '일상';
                setTodos(prev => [...prev, {
                    id: Date.now(), text: inputValue.replace(/#\S+/g, '').trim(), 
                    category: tag, type: taskType, priority, completed: false, date: selStr, createdAt: time
                }]);
                setInputValue("");
            };

            const toggleTodo = (id) => setTodos(prev => prev.map(t => t.id === id ? {...t, completed: !t.completed} : t));
            const deleteTodo = (id) => setTodos(prev => prev.filter(t => t.id !== id));
            const saveEdit = (id) => {
                const tag = (editValue.match(/#(\S+)/) || [])[1];
                setTodos(prev => prev.map(t => t.id === id ? {
                    ...t, text: editValue.replace(/#\S+/g, '').trim(), 
                    category: tag || t.category, type: editType, priority: editPriority
                } : t));
                setEditingId(null);
            };

            const filteredTodos = useMemo(() => {
                return todos.filter(t => {
                    if (activeTab === 'achieved') return t.completed;
                    const isSame = t.date === selStr;
                    if (selStr === todayStr && activeTab === 'today') return !t.completed && t.date <= todayStr;
                    return isSame && (activeTab === 'today' ? !t.completed : t.completed);
                }).sort((a,b) => (a.completed?1:-1) || (a.date < b.date ? -1:1));
            }, [todos, selStr, activeTab, todayStr]);

            const insightGroups = useMemo(() => {
                const dTasks = todos.filter(t => t.date === selStr || (t.type==='keep' && !t.completed));
                return {
                    todo: dTasks.filter(t => !t.completed && t.date === selStr && t.type === 'once'),
                    keep: dTasks.filter(t => !t.completed && t.type === 'keep'),
                    done: dTasks.filter(t => t.completed && t.date === selStr),
                    carry: dTasks.filter(t => !t.completed && t.date < selStr && t.type === 'once')
                };
            }, [todos, selStr]);

            const calCells = useMemo(() => {
                const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
                const f = new Date(y, m, 1).getDay(), l = new Date(y, m + 1, 0).getDate();
                const res = [];
                for(let i=0; i<f; i++) res.push({ empty: true });
                for(let i=1; i<=l; i++) {
                    const s = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    res.push({ day: i, dateStr: s, items: todos.filter(t => t.date === s) });
                }
                return res;
            }, [currentMonth, todos]);

            const PriorityBadge = ({ p }) => (
                <span className={`badge priority-${p}`}><i data-lucide="shield" style={{width:10}}></i> {p.toUpperCase()}</span>
            );

            return (
                <div className="container">
                    {/* Schedule */}
                    <div className="col-schedule glass-panel">
                        <div className="header" style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap: 'wrap', gap: '10px'}}>
                            <div>
                                <h2 className="title"><i data-lucide="layers" style={{color: 'var(--primary)'}}></i> 일정 관리</h2>
                                <p className="subtitle">Visual Time Mapping</p>
                            </div>
                            <div style={{display:'flex', gap:'10px'}}>
                                <button className="nav-btn" onClick={toggleTheme} title="테마 변경">
                                    <i data-lucide={theme === 'dark' ? 'sun' : 'moon'}></i>
                                </button>
                                <button className="big-data-btn" onClick={() => setShowBigData(true)}>
                                    <i data-lucide="activity"></i> 빅데이터 분석
                                </button>
                            </div>
                        </div>
                        <div className="cal-nav">
                            <button className="nav-btn" onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth()-1)))}><i data-lucide="arrow-left-circle"></i></button>
                            <span className="nav-text">{currentMonth.getFullYear()}. {String(currentMonth.getMonth()+1).padStart(2, '0')}</span>
                            <button className="nav-btn" onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth()+1)))}><i data-lucide="arrow-right-circle"></i></button>
                        </div>
                        <div className="cal-grid">
                            {['SUN','MON','TUE','WED','THU','FRI','SAT'].map(d => <div key={d} className="day-header">{d}</div>)}
                            {calCells.map((c, i) => (
                                <div key={i} className={`day-cell ${c.empty?'other':''} ${c.dateStr===selStr?'selected':''} ${c.dateStr===todayStr?'today':''}`}
                                    onClick={() => !c.empty && setSelectedDate(new Date(currentMonth.getFullYear(), currentMonth.getMonth(), c.day))}>
                                    <span className="day-num">{c.day}</span>
                                    <div className="day-dots">
                                        {c.items?.slice(0, 5).map(t => {
                                            const pColor = t.priority === 'high' ? 'var(--danger)' : t.priority === 'medium' ? 'var(--warning)' : 'var(--accent)';
                                            return <div key={t.id} className="dot" style={{
                                                background: pColor, 
                                                boxShadow: `0 0 5px ${pColor}`,
                                                opacity: t.completed ? 0.4 : 1,
                                                border: t.completed ? '1px solid white' : 'none'
                                            }}></div>
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Todo List */}
                    <div className="col-todo glass-panel">
                        <div className="header">
                            <h2 className="title"><i data-lucide="send" style={{color: 'var(--info)'}}></i> 할 일 목록</h2>
                            <p className="subtitle">Execute & Evolve</p>
                        </div>
                        <div className="tabs">
                            <div className={`tab ${activeTab==='today'?'active':''}`} onClick={() => setActiveTab('today')}>진행 중</div>
                            <div className={`tab ${activeTab==='done'?'active':''}`} onClick={() => setActiveTab('done')}>완료됨</div>
                            <div className={`tab ${activeTab==='achieved'?'active':''}`} onClick={() => setActiveTab('achieved')}>누적 보관</div>
                        </div>
                        <div className="input-box">
                            <div className="input-inner">
                                <input placeholder="#태그와 함께 계획을 기록하세요..." value={inputValue} onChange={e => setInputValue(e.target.value)} onKeyPress={e => e.key==='Enter' && addTodo()}/>
                                <button className="add-btn" onClick={addTodo}><i data-lucide="plus" style={{width:24}}></i></button>
                            </div>
                            <div className="selectors">
                                <div className="s-group">
                                    <span className="s-label">종류</span>
                                    <div className="choices">
                                        <button className={`choice ${taskType==='once'?'active':''}`} onClick={() => setTaskType('once')}>단발성</button>
                                        <button className={`choice ${taskType==='keep'?'active':''}`} onClick={() => setTaskType('keep')}>지속성</button>
                                    </div>
                                </div>
                                <div className="s-group">
                                    <span className="s-label">우선순위</span>
                                    <div className="choices">
                                        {[
                                            {id:'high', l:'높음'},
                                            {id:'medium', l:'중간'},
                                            {id:'low', l:'낮음'}
                                        ].map(p => <button key={p.id} className={`choice ${priority===p.id?'active':''}`} onClick={() => setPriority(p.id)}>{p.l}</button>)}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="list-container">
                            {filteredTodos.map(t => {
                                const carry = t.date < todayStr && !t.completed, editing = editingId === t.id;
                                return (
                                    <div key={t.id} className={`task-card ${carry ? 'is-carry' : ''} ${editing ? 'is-editing' : ''}`}>
                                        <div className={`check-circle ${t.completed?'done':''}`} onClick={() => !editing && toggleTodo(t.id)}>{t.completed && <i data-lucide="check" style={{width:16, color:'white'}}></i>}</div>
                                        <div className="task-body">
                                            {editing ? (
                                                <div>
                                                    <input className="edit-input" value={editValue} onChange={e => setEditValue(e.target.value)} onKeyPress={e => e.key==='Enter' && saveEdit(t.id)} autoFocus />
                                                    <div className="task-metadata">
                                                        <div className="choices" style={{padding:2}}>
                                                            <button className={`choice ${editType==='once'?'active':''}`} onClick={() => setEditType('once')}>단발</button>
                                                            <button className={`choice ${editType==='keep'?'active':''}`} onClick={() => setEditType('keep')}>지속</button>
                                                        </div>
                                                        <div className="choices" style={{padding:2}}>
                                                            {[
                                                                {id:'high', l:'높음'},
                                                                {id:'medium', l:'중간'},
                                                                {id:'low', l:'낮음'}
                                                            ].map(p => <button key={p.id} className={`choice ${editPriority===p.id?'active':''}`} onClick={() => setEditPriority(p.id)}>{p.l[0]}</button>)}
                                                        </div>
                                                        <button className="save-btn" onClick={() => saveEdit(t.id)}>저장</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <>
                                                    <span className={`task-title ${t.completed?'done':''}`}>{t.text}</span>
                                                    <div className="task-metadata">
                                                        {carry && <span className="badge carryover"><i data-lucide="alert-circle" style={{width:10}}></i> 이월됨</span>}
                                                        <span className={`badge ${t.type==='once'?'type-once':'type-keep'}`}>{t.type==='once'?'단발성':'지속성'}</span>
                                                        <span className={`badge priority-${t.priority}`}><i data-lucide="shield" style={{width:10}}></i> {t.priority==='high'?'높음':t.priority==='medium'?'중간':'낮음'}</span>
                                                        <span className="badge" style={{background:'rgba(255,255,255,0.05)', color:'var(--purple)'}}>#{t.category}</span>
                                                        <div className="task-footer"><i data-lucide="clock" style={{width:10}}></i> {t.createdAt} {carry && ` [${t.date}]`}</div>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                        <div className="actions">
                                            {!editing && <button className="btn-icon" onClick={() => { setEditingId(t.id); setEditValue(`${t.text} #${t.category}`); setEditType(t.type); setEditPriority(t.priority); }}><i data-lucide="pen-tool" style={{width:15}}></i></button>}
                                            <button className="btn-icon del" onClick={() => deleteTodo(t.id)}><i data-lucide="trash-2" style={{width:15}}></i></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Insight Dashboard */}
                    <div className="col-insight glass-panel">
                        <div className="header">
                            <h2 className="title"><i data-lucide="bar-chart-2" style={{color: 'var(--purple)'}}></i> 인사이트</h2>
                            <p className="subtitle">Visualized Progress</p>
                        </div>
                        <div className="insight-scroller">
                            {[
                                { id: 'todo', t: '할 일', i: 'target', c: 'var(--info)', d: insightGroups.todo },
                                { id: 'keep', t: '지속 과제', i: 'repeat', c: 'var(--purple)', d: insightGroups.keep },
                                { id: 'carry', t: '이월됨', i: 'alert-octagon', c: 'var(--danger)', d: insightGroups.carry },
                                { id: 'done', t: '완료됨', i: 'check-circle-2', c: 'var(--accent)', d: insightGroups.done }
                            ].map(s => s.d.length > 0 && (
                                <div key={s.id} className="ins-section">
                                    <div className="ins-header"><i data-lucide={s.i}></i> {s.t}</div>
                                    {s.d.map(t => (
                                        <div key={t.id} className="ins-card" style={{borderLeftColor: s.c, background: s.id==='carry'?'rgba(244,63,94,0.08)':'rgba(255,255,255,0.02)'}}>
                                            <div style={{minWidth:0}}>
                                                <div className="ins-text">{t.text}</div>
                                                <div className="ins-meta">
                                                    <PriorityBadge p={t.priority} />
                                                    <span style={{fontSize:'0.6rem', color:'var(--purple)', fontWeight:800}}>#{t.category}</span>
                                                </div>
                                            </div>
                                            <span className={`badge ${t.type==='once'?'type-once':'type-keep'}`}>{t.type==='once'?'단발성':'지속성'}</span>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Modal */}
                    {showBigData && (
                        <div className="modal-overlay" onClick={() => setShowBigData(false)}>
                            <div className="modal-body" onClick={e => e.stopPropagation()}>
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                                    <div>
                                        <h2 style={{fontSize:'2.2rem', fontWeight:900, fontFamily:'var(--font-accent)'}}>월간 데이터 분석</h2>
                                        <p style={{color:'var(--text-dim)', fontSize:'0.9rem', marginTop:8}}>{currentMonth.getFullYear()}년 {currentMonth.getMonth()+1}월의 여정을 데이터로 확인합니다.</p>
                                    </div>
                                    <button className="btn-icon" onClick={() => setShowBigData(false)}><i data-lucide="x-circle" style={{width:32}}></i></button>
                                </div>
                                <div className="stat-box">
                                    <div className="stat-item"><div className="stat-num">{monthlyStats.total}</div><div className="stat-lbl">총 목표</div></div>
                                    <div className="stat-item"><div className="stat-num" style={{color:'var(--accent)'}}>{monthlyStats.comp}</div><div className="stat-lbl">완료됨</div></div>
                                    <div className="stat-item">
                                        <div className="stat-num">{monthlyStats.rate}<span style={{fontSize:'1.5rem'}}>%</span></div>
                                        <div className="stat-lbl">달성률</div>
                                        <div className="progress-track"><div className="progress-bar" style={{width:`${monthlyStats.rate}%`}}></div></div>
                                    </div>
                                </div>
                                <div style={{marginTop:45, display:'grid', gridTemplateColumns:'1fr 1fr', gap:40}}>
                                    <div>
                                        <h3 className="s-label" style={{marginBottom:20}}>카테고리 분포</h3>
                                        {monthlyStats.categories.map(([tag, val]) => (
                                            <div key={tag} className="chart-row">
                                                <div className="chart-label">{tag}</div>
                                                <div className="chart-line-bg"><div className="chart-line-fill" style={{width:`${(val/monthlyStats.total)*100}%`}}></div></div>
                                                <div style={{fontSize:'0.7rem', fontWeight:800}}>{val}건</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div>
                                        <h3 className="s-label" style={{marginBottom:20}}>우선순위 밸런스</h3>
                                        {Object.entries(monthlyStats.prioMap).map(([p, v]) => (
                                            <div key={p} style={{display:'flex', justifyContent:'space-between', padding:'12px 18px', background:'rgba(0,0,0,0.2)', borderRadius:15, marginBottom:8}}>
                                                <span style={{fontSize:'0.8rem', fontWeight:800, color:p==='high'?'var(--danger)':p==='medium'?'var(--warning)':'var(--info)'}}>{p==='high'?'높음':p==='medium'?'중간':'낮음'}</span>
                                                <span style={{fontWeight:800}}>{v}건</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
