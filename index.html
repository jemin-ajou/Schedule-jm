                                                                const isRange = editDeadline && editStartDate && editDeadline !== editStartDate;
                                                                const isDisabled = isRange && type !== 'once';
                                                                return <button key={type} className={`choice ${editType===type?'active':''}`} style={{opacity:isDisabled?0.3:1, pointerEvents:isDisabled?'none':'auto'}} onClick={() => !isDisabled && setEditType(type)}><i data-lucide={type==='once'?'zap':type==='keep'?'refresh-cw':type==='weekly'?'calendar':'calendar'} style={{width:12, marginRight:4}}></i>{type==='once'?'단발':type==='keep'?'일일':type==='weekly'?'주간':'월간'}</button>
                                                            })}
                                                        </div>
                                                        <div className="choices" style={{padding:2}}>
                                                            {['high','medium','low'].map(p => <button key={p} className={`choice ${editPriority===p?'active':''}`} onClick={() => setEditPriority(p)}>{p==='high'?'높음':p==='medium'?'중간':'낮음'}</button>)}
                                                        </div>
                                                        <button className="save-btn" onClick={() => saveEdit(t.id)}>저장</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <>
                                                    <span className={`task-title ${t.completed?'done':''}`}>{t.text}</span>
                                                    <div className="task-metadata">
                                                        <span className="badge" style={{background:'rgba(99,102,241,0.1)', color:'var(--primary)', border:'1px solid rgba(99,102,241,0.2)'}}>
                                                            <i data-lucide={t.type==='once'?'zap':t.type==='keep'?'refresh-cw':'calendar'} style={{width:13, height:13}}></i>
                                                            {t.type==='once'?'단발성':t.type==='keep'?'일일 루틴':t.type==='weekly'?'주간 루틴':'월간 루틴'}
                                                        </span>
                                                        {(() => {
                                                            const isLT = t.type === 'once' && t.deadline && t.deadline.split('T')[0] !== t.date;
                                                            const isCO = t.type === 'once' && !t.completed && t.date < todayStr && !isLT;
                                                            return (
                                                                <>
                                                                    {isCO && (
                                                                        <span className="badge" style={{background:'rgba(244,63,94,0.1)', color:'var(--danger)', border:'1px solid var(--danger)'}}>
                                                                            <i data-lucide="alert-circle" style={{width:13, height:13}}></i> 
                                                                            이월 일정
                                                                        </span>
                                                                    )}
                                                                    {isLT && (
                                                                        <span className="badge" style={{background:'rgba(168, 85, 247, 0.1)', color:'var(--purple)', border:'1px solid var(--purple)'}}>
                                                                            <i data-lucide="clock" style={{width:13, height:13}}></i> 장기 일정
                                                                        </span>
                                                                    )}
                                                                </>
                                                            );
                                                        })()}
                                                        <PriorityBadge p={t.priority} />
                                                        <span className="badge" style={{background:'rgba(255,255,255,0.05)', color:'var(--purple)', border:'1px solid var(--glass-border)'}}>#{t.category}</span>
                                                        {t.deadline && <Countdown target={t.deadline} />}
                                                    </div>
                                                    <SubTaskList todoId={t.id} subtasks={t.subtasks} onToggle={toggleSub} onAdd={addSub} />
                                                </>
                                            )}
                                        </div>
                                        <div className="actions">
                                            {!isEditing && (
                                                <>
                                                    <button className="btn-icon" onClick={() => startEdit(t)} title="수정"><i data-lucide="edit-3"></i></button>
                                                    <button className="btn-icon copy" onClick={() => copyTodo(t)} title="복사"><i data-lucide="copy"></i></button>
                                                    {copiedTodo && <button className="btn-icon paste" onClick={pasteTodo} title="여기에 붙여넣기"><i data-lucide="clipboard"></i></button>}
                                                </>
                                            )}
                                            <button className="btn-icon del" onClick={() => deleteTodo(t.id)} title="삭제"><i data-lucide="trash-2"></i></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="col-insight glass-panel">
                        <div className="ins-top-block" style={{background: 'rgba(255,255,255,0.01)'}}>
                            <div className="header"><h2 className="title"><i data-lucide="bar-chart-3" style={{color:'var(--purple)'}}></i> 인사이트</h2><p className="subtitle">Visualized Progress</p></div>
                        </div>
                        <div className="ins-mid-block" style={{padding: '24px', background: 'rgba(255,255,255,0.015)'}}>
                            <AchievementTracker history={history} currentMonth={currentMonth} />
                        </div>
                        <div className="ins-bottom-block insight-scroller" style={{flex: 1, overflowY: 'auto', padding: '24px'}}>
                            {[
                                { id: 'carry', t: '이월된 항목', i: 'alert-circle', c: 'var(--danger)', d: insightGroups.carry },
                                { id: 'longterm', t: '장기 프로젝트', i: 'clock', c: 'var(--purple)', d: insightGroups.longterm },
                                { id: 'keep', t: '오늘의 루틴 습관', i: 'refresh-ccw', c: 'var(--warning)', d: insightGroups.keep },
                                { id: 'todo', t: '오늘 남은 일', i: 'list', c: 'var(--info)', d: insightGroups.todo },
                                { id: 'done', t: '완료됨', i: 'check-circle-2', c: 'var(--accent)', d: insightGroups.done }
                            ].map(s => s.d.length > 0 && (
                                <div key={s.id} className="ins-section">
                                    <div className="ins-header"><i data-lucide={s.i}></i> {s.t}</div>
                                    {s.d.map(t => (
                                        <div key={t.id} className="ins-card" style={{borderLeftColor: s.c}}>
                                            <div style={{minWidth:0}}><div className="ins-text">{t.text}</div><div className="ins-meta"><span style={{fontSize:'0.6rem', color:t.priority==='high'?'var(--danger)':t.priority==='medium'?'var(--warning)':'var(--accent)', fontWeight:800}}>{t.priority?.toUpperCase()}</span><span style={{fontSize:'0.6rem', color:'var(--purple)', fontWeight:800}}>#{t.category}</span></div></div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                            <div className="ins-section">
                                <div className="ins-header"><i data-lucide="database"></i> 데이터 관리</div>
                                <div style={{display:'flex', gap:10}}>
                                    <button className="choice" onClick={exportData} style={{background:'rgba(99,102,241,0.1)', color:'var(--primary)'}}><i data-lucide="download" style={{width:14, marginRight:5}}></i>엑셀 내보내기</button>
                                    <label className="choice" style={{background:'rgba(16,185,129,0.1)', color:'var(--accent)', cursor:'pointer'}}>
                                        <i data-lucide="upload" style={{width:14, marginRight:5}}></i>엑셀 가져오기 <input type="file" hidden onChange={importData} />
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Modal */}
                    {showBigData && (
                        <div className="modal-overlay" onClick={() => setShowBigData(false)}>
                            <div className="modal-body" onClick={e => e.stopPropagation()}>
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:30}}>
                                    <div style={{display:'flex', alignItems:'center', gap:15}}>
                                        <div style={{width:50, height:50, background:'var(--primary)', borderRadius:15, display:'flex', alignItems:'center', justifyContent:'center'}}>
                                            <i data-lucide="bar-chart-2" style={{color:'white'}}></i>
                                        </div>
                                        <div>
                                            <h2 style={{fontSize:'2rem', fontWeight:900, fontFamily:'var(--font-accent)', color:'white'}}>월간 데이터 분석</h2>
                                            <p style={{color:'var(--text-dim)', fontSize:'0.85rem'}}>{currentMonth.getFullYear()}년 {currentMonth.getMonth()+1}월의 여정</p>
                                        </div>
                                    </div>
                                    <button className="btn-icon" onClick={() => setShowBigData(false)} style={{background:'rgba(255,255,255,0.05)', padding:12, borderRadius:'50%'}}>
                                        <i data-lucide="x" style={{width:24, height:24}}></i>
                                    </button>
                                </div>
                                <div className="stat-box">
                                    <div className="stat-item"><div className="stat-num">{monthlyStats.total}</div><div className="stat-lbl">총 목표</div></div>
                                    <div className="stat-item"><div className="stat-num" style={{color:'var(--accent)'}}>{monthlyStats.comp}</div><div className="stat-lbl">완료됨</div></div>
                                    <div className="stat-item">
                                        <div className="stat-num">{monthlyStats.rate}<span style={{fontSize:'1.5rem'}}>%</span></div>
                                        <div className="stat-lbl">달성률</div>
                                        <div className="progress-track"><div className="progress-bar" style={{width:`${monthlyStats.rate}%`}}></div></div>
                                    </div>
                                </div>
                                <div style={{marginTop:45, display:'grid', gridTemplateColumns:'1fr 1fr', gap:40}}>
                                    <div>
                                        <h3 className="s-label" style={{marginBottom:20}}>카테고리 분포</h3>
                                        {monthlyStats.categories.map(([tag, val]) => (
                                            <div key={tag} className="chart-row">
                                                <div className="chart-label">{tag}</div>
                                                <div className="chart-line-bg"><div className="chart-line-fill" style={{width:`${(val/monthlyStats.total)*100}%`}}></div></div>
                                                <div style={{fontSize:'0.7rem', fontWeight:800}}>{val}건</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div>
                                        <h3 className="s-label" style={{marginBottom:20}}>우선순위 밸런스</h3>
                                        {Object.entries(monthlyStats.prioMap).map(([p, v]) => (
                                            <div key={p} style={{display:'flex', justifyContent:'space-between', padding:'12px 18px', background:'rgba(0,0,0,0.2)', borderRadius:15, marginBottom:8}}>
                                                <span style={{fontSize:'0.8rem', fontWeight:800, color:p==='high'?'var(--danger)':p==='medium'?'var(--warning)':'var(--info)'}}>{p==='high'?'높음':p==='medium'?'중간':'낮음'}</span>
                                                <span style={{fontWeight:800}}>{v}건</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Manual Modal */}
                    {showManual && (
                        <div className="modal-overlay" onClick={() => setShowManual(false)}>
                            <div className="modal-body" onClick={e => e.stopPropagation()} style={{width:800}}>
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:30}}>
                                    <div style={{display:'flex', alignItems:'center', gap:15}}>
                                        <div style={{width:50, height:50, background:'var(--purple)', borderRadius:15, display:'flex', alignItems:'center', justifyContent:'center'}}>
                                            <i data-lucide="book-open" style={{color:'white'}}></i>
                                        </div>
                                        <div>
                                            <h2 style={{fontSize:'2rem', fontWeight:900, fontFamily:'var(--font-accent)', color:'white'}}>사용 설명서</h2>
                                            <p style={{color:'var(--text-dim)', fontSize:'0.85rem'}}>Premium Task Manager Guide</p>
                                        </div>
                                    </div>
                                    <button className="btn-icon" onClick={() => setShowManual(false)} style={{background:'rgba(255,255,255,0.05)', padding:12, borderRadius:'50%'}}>
                                        <i data-lucide="x" style={{width:24, height:24}}></i>
                                    </button>
                                </div>
                                
                                <div className="manual-content" style={{color:'var(--text)', lineHeight:'1.7', fontSize:'0.9rem'}}>
                                    <section style={{marginBottom:30}}>
                                        <h3 style={{color:'var(--primary)', marginBottom:10, borderLeft:'4px solid var(--primary)', paddingLeft:10}}>🚀 핵심 단축키</h3>
                                        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, background:'rgba(255,255,255,0.03)', padding:20, borderRadius:20}}>
                                            <div><b>N</b> : 새 일정 입력창 포커스</div>
                                            <div><b>S</b> : 검색창 포커스</div>
                                            <div><b>T</b> : 테마 변경 (7가지 모드)</div>
                                            <div><b>M</b> : 통계 모달 열기</div>
                                            <div><b>Ctrl+C / V</b> : 일정 복사 및 붙여넣기</div>
                                            <div><b>방향키</b> : 달력 날짜 이동</div>
                                        </div>
                                    </section>

                                    <section style={{marginBottom:30}}>
                                        <h3 style={{color:'var(--accent)', marginBottom:10, borderLeft:'4px solid var(--accent)', paddingLeft:10}}>💡 주요 기능 가이드</h3>
                                        <ul style={{listStyle:'none', paddingLeft:10}}>
                                            <li style={{marginBottom:5}}>• <b>루틴 설정</b>: 일일, 주간, 월간 반복 일정을 설정하여 습관을 관리하세요.</li>
                                            <li style={{marginBottom:5}}>• <b>네온 히트맵</b>: 하루 일정을 모두 완료하면 달력에 <b>황금 별</b>이 나타납니다.</li>
                                            <li style={{marginBottom:5}}>• <b>장기 일정</b>: 마감 기한을 설정하면 달력에 <b>막대 형태</b>로 기간이 표시됩니다.</li>
                                            <li style={{marginBottom:5}}>• <b>데이터 백업</b>: 엑셀 내보내기/가져오기를 통해 데이터를 영구 보관하세요.</li>
                                        </ul>
                                    </section>

                                    <section>
                                        <h3 style={{color:'var(--purple)', marginBottom:10, borderLeft:'4px solid var(--purple)', paddingLeft:10}}>🖱️ 마우스 조작</h3>
                                        <p style={{opacity:0.8}}>일정 카드 위에 마우스를 올리면 <b>수정, 복사, 붙여넣기, 삭제</b> 버튼이 나타납니다. 복사 버튼을 누른 후 다른 날짜를 선택하고 붙여넣기 아이콘을 눌러보세요!</p>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
